<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Mining - Withdrawal Proofs</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/socket.io/socket.io.js" defer></script>
</head>
<body class="min-h-screen pb-24 overflow-x-hidden font-sans">

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 w-full">
    <!-- PAGE HEADER -->
    <div class="mb-8">
      <div class="flex items-center gap-3 text-gray-300 mb-2">
        <svg class="w-6 h-6 text-app-emerald" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Withdrawal Proofs</h1>
      </div>
      <p class="text-gray-400 text-sm sm:text-base">See successful transaction screenshots from our community</p>
    </div>

    <!-- PROOFS GRID (Injected by JavaScript) -->
    <div id="proofs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- JS will render proof cards here -->
    </div>
    
    <!-- Fallback/Loading State -->
    <div id="grid-loader" class="text-center py-10 text-gray-500">Loading proofs...</div>

  </main>

  <!-- FLOATING UPLOAD BUTTON -->
  <button id="open-upload-modal-btn" class="fixed bottom-24 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-500 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110 z-50">
    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
  </button>

  <!-- UPLOAD MODAL & BACKDROP -->
  <div id="upload-modal-backdrop" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity"></div>
  <div id="upload-modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[92%] max-w-md z-[101] hidden flex-col opacity-0 scale-95 transition-all">
    <div class="flex justify-between items-center">
      <h3 class="text-lg font-bold text-white">Upload Proof</h3>
      <button id="close-upload-modal-btn" class="text-gray-400 hover:text-white">&times;</button>
    </div>
    <form id="upload-form" class="space-y-4">
      <div>
        <label class="text-sm text-gray-400 mb-2 block">Screenshot of Confirmation</label>
        <div id="image-preview-box" class="w-full h-40 bg-app-bgDark border-2 border-dashed border-gray-700 rounded-lg flex items-center justify-center text-gray-500 text-sm cursor-pointer hover:border-app-btnBlue transition-colors">
          Click to select an image
        </div>
        <img id="image-preview" src="" alt="Image preview" class="hidden w-full h-40 object-contain rounded-lg bg-app-bgDark mt-2">
        <input type="file" id="image-input" accept="image/png, image/jpeg, image/jpg" class="hidden">
      </div>
      <div>
        <label for="caption-input" class="text-sm text-gray-400 mb-2 block">Add a short caption (optional)</label>
        <input type="text" id="caption-input" class="w-full bg-app-bgDark border border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Legit platform!">
      </div>
      <button type="submit" id="submit-proof-btn" class="w-full bg-app-btnBlue hover:bg-sky-400 text-white font-bold py-3.5 rounded-lg text-sm transition-colors flex justify-center items-center gap-2">
        <span id="submit-proof-text">Submit for Verification</span>
        <svg id="submit-proof-spinner" class="hidden animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">...</svg>
      </button>
    </form>
  </div>

  <!-- Navbar Container -->
  <div id="app-nav"></div>

  <!-- Scripts -->
  <script src="/navbar-loader.js"></script>
  <script src="/profits.js"></script>
</body>
</html>
