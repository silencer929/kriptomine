<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kripto MIne - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/icon-helper.js" defer></script>
  <script src="/login.js" defer></script>
</head>
<body class="login-page min-h-screen text-white">
  <main class="login-shell">
    <div class="login-frame">
      <div class="brand-row">
        <span class="brand-badge">
          <img src="/images/bitcoin-btc-logo.png" alt="Kripto Mine" class="brand-logo-image">
        </span>
        <div>
          <h1 class="brand-title">Kripto Mine</h1>
        </div>
      </div>
      <p class="brand-subtitle">Safe sign in to monitor your crypto portfolio, withdrawals, and mining rewards.</p>

      <section class="login-auth-card" aria-labelledby="loginTitle">
        <div class="login-card-header">
          <h2 id="loginTitle" class="login-heading">Welcome Back</h2>
          <p class="login-copy">Login to access your crypto dashboard</p>
          <div id="iconTray" class="coin-row" aria-hidden="true"></div>
        </div>

        <div class="login-card-body">
          <div id="error" class="auth-message hidden" role="alert" aria-live="polite"></div>

          <form id="loginForm" class="field-stack" novalidate>
            <input type="hidden" id="csrfToken" name="_csrf" aria-hidden="true">

            <div class="field-shell">
              <label for="username" class="sr-only">Email or username</label>
              <span class="field-icon" aria-hidden="true">✉️</span>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Email or Username"
                required
                aria-required="true"
                autocomplete="username"
              >
            </div>

            <div class="field-shell">
              <label for="password" class="sr-only">Password</label>
              <span class="field-icon" aria-hidden="true">🔒</span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required
                aria-required="true"
                autocomplete="current-password"
              >
              <button type="button" id="togglePassword" class="toggle-visibility" aria-label="Toggle password visibility">Show</button>
            </div>

            <div class="auth-row">
              <label class="remember-label" for="rememberMe">
                <input type="checkbox" id="rememberMe" name="rememberMe" />
                <span>Remember me</span>
              </label>
              <a href="/support.html" class="forgot-btn" id="forgotPassword">Forgot password?</a>
            </div>

            <button id="loginBtn" type="submit" class="login-submit focus:outline-none focus:ring-2 focus:ring-blue-400">
              <span>Login to Dashboard</span>
              <span aria-hidden="true">→</span>
            </button>
          </form>

          <div class="helper-card">
            <span class="helper-icon" aria-hidden="true">🛡️</span>
            <p class="m-0 text-sm leading-6">Your session is protected with secure sign-in and encrypted account access.</p>
          </div>
        </div>

        <div class="signup-meta">
          <p class="m-0">Don’t have an account? <a href="/signup.html" id="signupLink">Sign Up</a></p>
          <div class="helpline">24/7 Helpline</div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
